name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows
          - platform: macos-latest
            name: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i to install Rust..."
            if rustup --version 2>/dev/null; then
              echo "Rustup already installed"
              break
            fi
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable && break
            echo "Attempt $i failed, waiting before retry..."
            sleep $((i * 10))
          done
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri
        run: pnpm tauri build

      - name: Prepare Windows artifacts
        if: matrix.name == 'windows'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
          ls -la artifacts/
        shell: bash

      - name: Prepare macOS artifacts
        if: matrix.name == 'macos'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
          ls -la artifacts/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifacts
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: .

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: .

      - name: List files
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            *.msi
            *.exe
            *.dmg
